<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; worker-src 'self'; style-src 'self'; img-src 'self' data:; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="เรียนและเล่นโกะ (หมากล้อม / 围棋 / Go) ในเบราว์เซอร์ พร้อมโหมดสอนเล่นทีละขั้น">
  <title>围棋 · Go · หมากล้อม — เรียนและเล่น</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <h1><span class="cjk">围棋</span> Go <span class="cjk">หมากล้อม</span></h1>
        <span class="sub">learn &amp; play</span>
      </div>
      <div class="top-controls">
        <button id="langBtn" class="btn" type="button">EN</button>
        <button id="themeBtn" class="btn icon-btn" type="button" aria-label="theme">◐</button>
      </div>
    </header>

    <div class="modes" role="group" aria-label="mode">
      <button id="modePlayBtn" data-mode="play" type="button" aria-pressed="false">Two players</button>
      <button id="modeBotBtn" data-mode="bot" type="button" aria-pressed="false">Vs bot</button>
      <button id="modeLearnBtn" data-mode="learn" type="button" aria-pressed="true">Learn</button>
    </div>

    <div class="layout">
      <section>
        <div class="board-wrap">
          <svg id="board" tabindex="0" role="application" viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="gradBlack" cx="38%" cy="32%" r="75%">
                <stop offset="0%" stop-color="#6a6358"/>
                <stop offset="40%" stop-color="#2a2722"/>
                <stop offset="100%" stop-color="#100e0b"/>
              </radialGradient>
              <radialGradient id="gradWhite" cx="38%" cy="32%" r="80%">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="55%" stop-color="#f1ece0"/>
                <stop offset="100%" stop-color="#d2c9b6"/>
              </radialGradient>
            </defs>
            <g id="layerGrid"></g>
            <g id="layerMark"></g>
            <g id="layerStone"></g>
            <g id="layerOver"></g>
          </svg>
        </div>

        <div class="actions">
          <button id="newGameBtn" class="btn primary" type="button">New game</button>
          <button id="passBtn" class="btn" type="button">Pass</button>
          <button id="undoBtn" class="btn" type="button">Undo</button>
          <button id="countBtn" class="btn" type="button">Count score</button>
        </div>
        <div id="status" class="status" role="status" aria-live="polite"></div>
      </section>

      <aside class="panel">
        <div class="mascot-row">
          <!-- licensed 碁石さん art (@tororo2048) drops in here once permission is granted -->
          <div id="mascot" class="mascot" aria-hidden="true" hidden></div>
          <p id="mascotMsg" class="mascot-msg"></p>
        </div>
        <h2 id="panelTitle">Learn</h2>
        <p id="panelBody"></p>

        <div id="goalBox" class="goal-box" hidden><span id="goalText"></span></div>

        <div id="lessonNav" class="lesson-nav" hidden>
          <button id="prevLesson" type="button">‹ Prev</button>
          <span id="lessonProgress" class="progress">1 / 7</span>
          <button id="nextLesson" type="button">Next ›</button>
        </div>
        <div class="actions" style="margin-top:8px">
          <button id="hintBtn" class="btn" type="button" hidden>Hint</button>
          <button id="gotItBtn" class="btn primary" type="button" hidden>Got it</button>
        </div>

        <div class="meta">
          <span class="turn"><span id="turnLabel">To move</span>:
            <span id="turnSwatch" class="swatch black"></span><span id="turnName">Black</span></span>
        </div>
        <div class="caps">
          <span id="capBlack">Black captured: 0</span>
          <span id="capWhite">White captured: 0</span>
        </div>

        <div id="sizeRow" class="size-row">
          <label id="sizeLabel" for="sizeSel">Board size</label>
          <select id="sizeSel">
            <option value="9" selected>9 × 9</option>
            <option value="13">13 × 13</option>
            <option value="19">19 × 19</option>
          </select>
        </div>

        <div id="scoreControls" hidden>
          <p id="scoreHint" class="score-hint"></p>
          <button id="resumeBtn" class="btn" type="button">Resume</button>
        </div>

        <div id="scoreBox" class="score-box" hidden>
          <h3 id="scoreHead">Score</h3>
          <div id="scoreLine" class="line"></div>
          <div id="scoreWinner" class="winner"></div>
        </div>
      </aside>
    </div>

    <footer>
      <span>Open source · zero dependencies · </span>
      <a id="repoLink" href="#" rel="noopener">source</a>
    </footer>
  </div>

  <script src="engine.js"></script>
  <script src="lessons.js"></script>
  <script src="ui.js"></script>
</body>
</html>
